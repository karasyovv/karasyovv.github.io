<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Agridera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/middle.css">
    <link rel="stylesheet" href="css/footer.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="d-flex flex-column min-vh-100">

<header class="bg-light border-bottom position-relative">
    <div class="container py-3 d-flex justify-content-between align-items-center">
        <a href="index.html" class="logo-link">
            <img src="images/logo.png" alt="Agridera Logo" class="logo-img" style="height: 50px;">
        </a>
        
        <button class="navbar-toggler d-lg-none border-0 bg-transparent" type="button" data-bs-toggle="collapse" data-bs-target="#mobileNav">
            <i class="fas fa-bars fs-2 text-success"></i>
        </button>

        <div class="header-right collapse d-lg-flex flex-column align-items-end gap-2" id="mobileNav">
            <div class="search-bar mt-3 mt-lg-0 w-100 text-center text-lg-end">
                <input type="text" placeholder="Search" class="form-control form-control-sm rounded-pill d-inline-block" style="width: auto;">
                <i class="fas fa-search position-relative" style="left: -25px;"></i>
            </div>
            <nav class="navbar navbar-expand-lg navbar-light p-0 mt-3 mt-lg-0 w-100">
                <ul class="navbar-nav gap-3 fs-8 flex-column flex-lg-row align-items-center w-100 justify-content-lg-end pb-3 pb-lg-0">
                    <li class="nav-item"><a href="index.html" class="nav-link text-muted serif-font p-0">Home</a></li>
                    <li class="nav-item"><a href="#" class="nav-link text-muted serif-font p-0">Company Profile</a></li>
                    <li class="nav-item"><a href="#" class="nav-link text-muted serif-font p-0">Products</a></li>
                    <li class="nav-item"><a href="#" class="nav-link text-muted serif-font p-0">Services</a></li>
                    <li class="nav-item"><a href="#" class="nav-link text-muted serif-font p-0">R & D</a></li>
                    <li class="nav-item"><a href="contact.html" class="nav-link text-muted serif-font p-0">Contact</a></li>
                </ul>
            </nav>
        </div>
    </div>
</header>

<main class="flex-grow-1">

    <section class="contact-banner-section">
        <img src="images/7878.jpg" alt="Contact Banner" class="w-100 img-fluid">
    </section>

    <section class="contact-form-section mt-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <h1 class="serif-font fw-bold text-secondary mb-2">Contact us</h1>
                    <div class="mb-4">
                        <i class="fas fa-star text-green fs-8"></i>
                        <i class="fas fa-star text-green fs-8"></i>
                        <i class="fas fa-star text-green fs-8"></i>
                        <i class="fas fa-star text-green fs-8"></i>
                        <i class="fas fa-star text-green fs-8"></i>
                    </div>

                    <form>
                        <div class="row gx-md-5 gy-4">
                            <div class="col-md-6 d-flex flex-column gap-3">
                                <div>
                                    <label class="form-label serif-font text-secondary">Name *</label>
                                    <input type="text" class="form-control custom-input">
                                </div>
                                <div>
                                    <label class="form-label serif-font text-secondary">Company Name</label>
                                    <input type="text" class="form-control custom-input">
                                </div>
                                <div>
                                    <label class="form-label serif-font text-secondary">Position</label>
                                    <input type="text" class="form-control custom-input">
                                </div>
                                <div>
                                    <label class="form-label serif-font text-secondary">City</label>
                                    <input type="text" class="form-control custom-input">
                                </div>
                                <div>
                                    <label class="form-label serif-font text-secondary">Country</label>
                                    <input type="text" class="form-control custom-input">
                                </div>
                                <div>
                                    <label class="form-label serif-font text-secondary">Telephone</label>
                                    <input type="text" class="form-control custom-input">
                                </div>
                                <div>
                                    <label class="form-label serif-font text-secondary">Email *</label>
                                    <input type="email" class="form-control custom-input">
                                </div>
                            </div>

                            <div class="col-md-6 d-flex flex-column gap-3">
                                <div>
                                    <label class="form-label serif-font text-secondary">You are a</label>
                                    <select class="form-select custom-input text-muted">
                                        <option selected>seed producer</option>
                                        <option value="1">distributor</option>
                                        <option value="2">farmer</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="form-label serif-font text-secondary">If other, please specify</label>
                                    <input type="text" class="form-control custom-input">
                                </div>
                                <div class="flex-grow-1 d-flex flex-column">
                                    <label class="form-label serif-font text-secondary">You are interested in</label>
                                    <textarea class="form-control custom-input flex-grow-1" style="min-height: 150px;"></textarea>
                                </div>
                                
                                <div class="mt-2">
                                    <label class="form-label serif-font text-secondary mb-2">Please type this code</label>
                                    <div class="d-flex align-items-center gap-3 flex-wrap">
                                        <div class="captcha-text text-secondary">7 c J 3</div>
                                        <input type="text" class="form-control custom-input captcha-input">
                                        <button type="button" class="btn btn-submit ms-auto">Send Message</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <section class="address-section">
        <div class="container text-center">
            <div class="address-wrapper d-inline-block">
                <h2 class="serif-font text-green fw-bold fs-5 mb-2">Our Address</h2>
                <div class="address-divider mb-3"></div>
                <p class="text-secondary fs-7 mb-0 serif-font">
                    AGRIDERA Seeds & Agriculture Ltd.<br>
                    P.O Box 103,<br>
                    Gedera 70750, Israel.<br>
                    Telephone: <span class="text-green">+972 8 944 9222</span>
                </p>
            </div>
        </div>
    </section>
</main>

<footer class="bottom-footer py-4">
    <div class="container d-flex justify-content-between align-items-center flex-wrap">
        <nav class="footer-nav d-flex gap-3">
            <a href="#">PROFILE</a>
            <a href="#">MANAGEMENT</a>
            <a href="#">PRODUCTS</a>
            <a href="#">R&D</a>
            <a href="#">LINKS</a>
            <a href="#">SITEMAP</a>
            <a href="#">CONTACT</a>
        </nav>
        <div class="social-icons d-flex gap-2">
            <a href="#"><img src="images/ico_in.png" alt="LinkedIn"></a>
            <a href="#"><img src="images/ico_inst.png" alt="Instagram"></a>
            <a href="#"><img src="images/ico_tube.png" alt="YouTube"></a>
            <a href="#"><img src="images/ico_tw.png" alt="Twitter"></a>
            <a href="#"><img src="images/ico_fb.png" alt="Facebook"></a>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
