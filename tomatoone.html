<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/middle.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="js/main.js" defer></script>
</head>
<body>
<div id="app">
    <header class="bg-light border-bottom position-relative">
        <div class="container py-3 d-flex justify-content-between align-items-center">
            <a href="index.html" class="logo-link">
                <img src="images/logo.png" alt="Agridera Logo" class="logo-img" style="height: 50px;">
            </a>
            
            <button class="navbar-toggler d-lg-none border-0 bg-transparent" type="button" data-bs-toggle="collapse" data-bs-target="#mobileNav">
                <i class="fas fa-bars fs-2 text-success"></i>
            </button>

            <div class="header-right collapse d-lg-flex flex-column align-items-end gap-2" id="mobileNav">
                <div class="search-bar mt-3 mt-lg-0 w-100 text-center text-lg-end">
                    <input type="text" placeholder="Search" class="form-control form-control-sm rounded-pill d-inline-block" style="width: auto;">
                    <i class="fas fa-search position-relative" style="left: -25px;"></i>
                </div>
                <nav class="navbar navbar-expand-lg navbar-light p-0 mt-3 mt-lg-0 w-100">
                    <ul class="navbar-nav gap-3 fs-8 flex-column flex-lg-row align-items-center w-100 justify-content-lg-end pb-3 pb-lg-0">
                        <li class="nav-item"><a href="index.html" class="nav-link text-muted serif-font p-0">Home</a></li>
                        <li class="nav-item"><a href="contact.html" class="nav-link text-muted serif-font p-0">Contact</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main class="container my-5">
        <div class="row" v-if="product && product.id">
            <div class="col-md-6 mb-4 mb-md-0">
                <img :src="product.image" class="img-fluid rounded shadow-sm w-100 object-fit-cover" :alt="product.title" style="max-height: 400px;">
            </div>
            
            <div class="col-md-6">
                <h1 class="serif-font text-success mb-3">{{ product.title }}</h1>
                <h4 class="text-secondary mb-4">{{ product.short_text }}</h4>
                <p class="text-muted lh-lg mb-5">{{ product.desc }}</p>
                
                <div class="d-flex gap-3">
                    <button class="btn btn-success px-4 py-2 fw-bold" @click="addToCart(product.id)" v-if="btnVisible === 0">
                        Add to cart
                    </button>
                    
                    <a href="contact.html" class="btn btn-primary px-4 py-2 fw-bold" v-if="btnVisible === 1">
                        Go to cart
                    </a>
                </div>
            </div>
        </div>
        <div v-else class="text-center py-5">
            <h3>Товар не знайдено</h3>
            <a href="tomato.html" class="btn btn-outline-success mt-3">Повернутися до каталогу</a>
        </div>
    </main>

    <footer class="bottom-footer py-4 mt-auto">
        <div class="container d-flex justify-content-between align-items-center flex-wrap">
            <nav class="footer-nav d-flex gap-3">
                <a href="index.html">HOME</a>
                <a href="contact.html">CONTACT</a>
            </nav>
            <div class="social-icons d-flex gap-2">
                <a href="#"><img src="images/ico_in.png" alt="LinkedIn"></a>
                <a href="#"><img src="images/ico_inst.png" alt="Instagram"></a>
                <a href="#"><img src="images/ico_tube.png" alt="YouTube"></a>
            </div>
        </div>
    </footer>
</div>
</body>
</html>
